<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>-Sistema de Comidas-       Cas Subof GECB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 2em;
        }

        h2 {
            color: #444;
            margin-bottom: 15px;
        }

        h3 {
            color: #555;
            margin: 20px 0 10px 0;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 5px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            padding: 8px 16px;
            background: #f0f0f0;
            color: #666;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-comida {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
            margin: 5px;
        }

        #btn-cena {
            background: #2c3e50;
            color: white;
        }

        #btn-almuerzo {
            background: #f39c12;
            color: white;
        }

        .btn-comida:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .horario-aviso {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
        }

        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-align: center;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .botones-comida {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .historial, .raciones {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .raciones-info {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .racion-card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .racion-numero {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
        }

        #historial-content {
            max-height: 300px;
            overflow-y: auto;
        }

        .registro-item {
            background: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <!-- Pantalla de Login -->
    <div id="login-screen">
        <div class="container">
            <h1>🍽️ -Sistema de Comidas-       Cas Subof GECB</h1>
            <p>Ingresa con tu DNI</p>
            
            <input type="text" id="dni-input" placeholder="DNI" class="input-field" value="32849488">
            <input type="password" id="password-input" placeholder="Contraseña" class="input-field" value="32849488">
            
            <button onclick="handleLogin()" class="btn-primary">Ingresar</button>
            
            <div id="login-message" class="message"></div>
        </div>
    </div>

    <!-- Pantalla Principal -->
    <div id="main-screen" style="display: none;">
        <div class="container">
            <div class="header">
                <h2>Bienvenido, <span id="user-name"></span></h2>
                <button onclick="logout()" class="btn-secondary">Salir</button>
            </div>

            <div id="horario-message" class="horario-aviso"></div>

            <div class="opciones-comida">
                <h3>📝 Anotarme a:</h3>
                <div class="botones-comida">
                    <button onclick="anotarComida('CENA')" id="btn-cena" class="btn-comida">🌙 CENA</button>
                    <button onclick="anotarComida('ALMUERZO')" id="btn-almuerzo" class="btn-comida">☀️ ALMUERZO</button>
                </div>
                <div id="anotacion-message" class="message"></div>
            </div>

            <div class="historial">
                <h3>📋 Mi Historial</h3>
                <button onclick="cargarHistorial()" class="btn-secondary">Actualizar</button>
                <div id="historial-content"></div>
            </div>
        </div>
    </div>

    <!-- Pantalla Admin -->
    <div id="admin-screen" style="display: none;">
        <div class="container">
            <div class="header">
                <h2>👑 Panel Admin</h2>
                <button onclick="logout()" class="btn-secondary">Salir</button>
            </div>

            <div class="raciones">
                <h3>📊 Raciones para hoy</h3>
                <div class="raciones-info">
                    <div class="racion-card">
                        <h4>☀️ ALMUERZO</h4>
                        <p class="racion-numero" id="raciones-almuerzo">0</p>
                    </div>
                    <div class="racion-card">
                        <h4>🌙 CENA</h4>
                        <p class="racion-numero" id="raciones-cena">0</p>
                    </div>
                </div>
                <button onclick="cargarRaciones()" class="btn-secondary">Actualizar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwGFdbIDLBX9xWyxMt6iTTfP8TCPNOqcfYQtAl0wntGbrd7Ynjf3RD0EFcQwdMTFfagWQ/exec';
        
        let usuarioActual = null;
        let esAdmin = false;

        function mostrarMensaje(elementId, mensaje, esExito) {
            const el = document.getElementById(elementId);
            el.textContent = mensaje;
            el.className = esExito ? 'message success' : 'message error';
            setTimeout(() => {
                el.textContent = '';
                el.className = 'message';
            }, 3000);
        }

        function formatearFecha(fecha) {
            if (!fecha) return '';
            const f = new Date(fecha);
            return f.toLocaleDateString('es-ES');
        }

        function handleLogin() {
            const dni = document.getElementById('dni-input').value;
            const password = document.getElementById('password-input').value;
            
            const datos = {
                accion: 'login',
                dni: dni,
                password: password
            };
            
            const url = API_URL + '?datos=' + encodeURIComponent(JSON.stringify(datos));
            
            fetch(url)
                .then(response => response.json())
                .then(resultado => {
                    if (resultado.success) {
                        usuarioActual = {
                            dni: dni,
                            nombre: resultado.data.nombre
                        };
                        
                        esAdmin = (dni === '32849488');
                        
                        document.getElementById('user-name').textContent = resultado.data.nombre;
                        document.getElementById('login-screen').style.display = 'none';
                        
                        if (esAdmin) {
                            document.getElementById('admin-screen').style.display = 'block';
                            cargarRaciones();
                        } else {
                            document.getElementById('main-screen').style.display = 'block';
                            verificarHorario();
                            cargarHistorial();
                        }
                    } else {
                        mostrarMensaje('login-message', resultado.message, false);
                    }
                })
                .catch(error => {
                    mostrarMensaje('login-message', 'Error de conexión', false);
                });
        }

        function logout() {
            usuarioActual = null;
            esAdmin = false;
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
        }

        function verificarHorario() {
            const ahora = new Date();
            const hora = ahora.getHours();
            const minutos = ahora.getMinutes();
            
            let valido = (hora >= 22 || hora < 9 || (hora === 9 && minutos <= 30));
            let mensaje = valido ? '✅ Horario ABIERTO (22:00 - 9:30)' : '❌ Horario CERRADO';
            
            document.getElementById('horario-message').textContent = mensaje;
            document.getElementById('btn-cena').disabled = !valido;
            document.getElementById('btn-almuerzo').disabled = !valido;
        }

        function anotarComida(tipo) {
            const hoy = new Date().toISOString().split('T')[0];
            
            const datos = {
                accion: 'anotar',
                dni: usuarioActual.dni,
                tipoComida: tipo,
                fecha: hoy
            };
            
            const url = API_URL + '?datos=' + encodeURIComponent(JSON.stringify(datos));
            
            fetch(url)
                .then(response => response.json())
                .then(resultado => {
                    if (resultado.success) {
                        mostrarMensaje('anotacion-message', `✅ Te anotaste a ${tipo}`, true);
                        cargarHistorial();
                    } else {
                        mostrarMensaje('anotacion-message', resultado.message, false);
                    }
                });
        }

        function cargarHistorial() {
            const datos = {
                accion: 'historial',
                dni: usuarioActual.dni
            };
            
            const url = API_URL + '?datos=' + encodeURIComponent(JSON.stringify(datos));
            
            fetch(url)
                .then(response => response.json())
                .then(resultado => {
                    if (resultado.success) {
                        mostrarHistorial(resultado.data);
                    }
                });
        }

        function mostrarHistorial(historial) {
            const contenedor = document.getElementById('historial-content');
            
            if (!historial || historial.length === 0) {
                contenedor.innerHTML = '<p>Sin anotaciones</p>';
                return;
            }
            
            let html = '';
            historial.forEach(r => {
                html += `
                    <div class="registro-item">
                        <span>${formatearFecha(r.fecha)} - ${r.tipoComida}</span>
                        <span>${r.estado}</span>
                    </div>
                `;
            });
            
            contenedor.innerHTML = html;
        }

        function cargarRaciones() {
            const hoy = new Date().toISOString().split('T')[0];
            
            const datos = {
                accion: 'raciones',
                fecha: hoy
            };
            
            const url = API_URL + '?datos=' + encodeURIComponent(JSON.stringify(datos));
            
            fetch(url)
                .then(response => response.json())
                .then(resultado => {
                    if (resultado.success) {
                        document.getElementById('raciones-almuerzo').textContent = resultado.data.almuerzo;
                        document.getElementById('raciones-cena').textContent = resultado.data.cena;
                    }
                });
        }

        // Verificar horario cada minuto
        setInterval(() => {
            if (document.getElementById('main-screen').style.display === 'block') {
                verificarHorario();
            }
        }, 60000);
    </script>
</body>
</html>
